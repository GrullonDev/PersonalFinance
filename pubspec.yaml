name: personal_finance
description: "A project to manage personal finances with features like income and expense tracking, charts, and Firebase integration."

version: 1.1.4

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  fl_chart: ^1.0.0
  syncfusion_flutter_charts: ^32.2.8
  
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.3
  get_it: ^9.2.1
  equatable: ^2.0.5
  flutter_bloc: ^9.0.0
  firebase_auth: ^6.2.0
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.1.0
  firebase_core: ^4.5.0
  connectivity_plus: ^7.0.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  image_picker: ^1.1.2
  flutter_svg: ^2.2.1
  http: ^1.2.2

  dartz: ^0.10.1
  json_annotation: ^4.9.0
  jwt_decoder: ^2.0.1
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.1
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  firebase_remote_config: ^6.2.0
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  local_auth_darwin: ^2.0.3
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  firebase_messaging: ^16.1.2
  flutter_timezone: ^5.0.1
  in_app_update: ^4.2.5
  upgrader: ^12.5.0
  confetti: ^0.8.0
  table_calendar: ^3.2.0
  uuid: ^4.5.3
  google_mlkit_text_recognition: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4

flutter:  
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/privacy_policy.md
    - assets/icons/google.svg
    - assets/icons/apple.svg

# Launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_foreground: assets/logo.png
  adaptive_icon_background: "#0E8F5B"
  min_sdk_android: 21
